version: "3.9"

services:
  aggregator:
    build: ./aggregator
    image: uts-aggregator:latest
    container_name: aggregator
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@storage:5432/logdb
      - REDIS_URL=redis://broker:6379
      - WORKER_COUNT=4
    ports:
      - "8080:8080"
    volumes:
      - aggregator_logs:/var/log/aggregator
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  publisher:
    build: ./publisher
    image: uts-publisher:latest
    container_name: publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      - TARGET_URL=http://aggregator:8080/publish
      - DUPLICATE_RATE=0.35
      - TOTAL_EVENTS=25000
      - BATCH_SIZE=50
      - CONCURRENCY=10
    networks:
      - internal
    restart: "no"

  broker:
    image: redis:7-alpine
    container_name: broker
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - broker_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  storage:
    image: postgres:16-alpine
    container_name: storage
    environment:
      - POSTGRES_DB=logdb
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./aggregator/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d logdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: false   # expose hanya untuk demo lokal via port mapping

volumes:
  pg_data:
  broker_data:
  aggregator_logs:
